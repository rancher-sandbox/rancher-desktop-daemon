name: Sync go.mod Kubernetes modules
on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
    - 'go.mod'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  update-go-mod:
    # This step gets run regardless of how the workflow was triggered, so that
    # if we can't write to the pull request the user can still apply it
    # manually (though running the script locally would be easier).
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
      go-mod: ${{ steps.changed.outputs.go-mod }}
      go-sum: ${{ steps.changed.outputs.go-sum }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        cache: false
        go-version-file: go.mod
    - run: go run scripts/go-module-k8s-bump/main.go
    - run: go mod tidy
    - name: Check for changes
      id: changed
      run: |
        if [ -n "$(git status --porcelain -- go.mod)" ]; then
          {
            echo changed=true
            echo 'go-mod<<@@EOF@@'
            cat go.mod
            echo '@@EOF@@'
            echo 'go-sum<<@@EOF@@'
            cat go.sum
            echo '@@EOF@@'
          } >> "$GITHUB_OUTPUT"
          {
            echo '```diff'
            git diff go.mod
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        else
          echo changed= >> "$GITHUB_OUTPUT"
          echo "### No changes to go.mod required" >> "$GITHUB_STEP_SUMMARY"
        fi
  commit-changes:
    needs: update-go-mod
    # Skip cross-repository PRs: GITHUB_TOKEN can't push to forks, and
    # update-go-mod already shows the required diff in the step summary.
    if: >-
      needs.update-go-mod.outputs.changed
      && (!github.event.pull_request || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      id-token: write # Required for ./.github/actions/get-token
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - # Get a GitHub token that can write to the repository, and will trigger CI
      # on commit.  The normal github.token will not trigger further CI.
      id: get-token
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: ./.github/actions/get-token
      with:
        token-secret: ${{ secrets.RUN_WORKFLOW_FROM_WORKFLOW }}
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: true
        ref: ${{ github.head_ref }}
        # If we don't have a writable token, then pushing will fail later; this
        # is intentional so the workflow shows up as having failed.
        token: ${{ steps.get-token.outputs.token || github.token }}
    - run: cat <<<$GO_MOD >go.mod
      env:
        GO_MOD: ${{ needs.update-go-mod.outputs.go-mod }}
    - run: cat <<<$GO_SUM >go.sum
      env:
        GO_SUM: ${{ needs.update-go-mod.outputs.go-sum }}
    - name: Commit changes
      run: >-
        git
        -c user.name="$GIT_AUTHOR_NAME"
        -c user.email="$GIT_AUTHOR_EMAIL"
        commit
        --message='Update Kubernetes go modules'
        --signoff
        --
        go.mod go.sum
      env:
        GIT_AUTHOR_NAME: Rancher Desktop Dependency Manager
        GIT_AUTHOR_EMAIL: donotuse@rancherdesktop.io # spellchecker:ignore
    - name: Push changes
      run: |
        git show
        git push origin ${{ github.head_ref }}
