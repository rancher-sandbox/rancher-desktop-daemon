on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-pr-number:
    name: Lookup Pull Request
    outputs:
      number: ${{ steps.lookup.outputs.number }}
    runs-on: ubuntu-latest
    steps:
    - id: lookup
      if: >-
        github.event_name == 'push' &&
        github.repository_owner == 'rancher-sandbox' &&
        github.ref_type == 'branch' &&
        !github.ref_protected
      shell: bash
      run: >-
        printf "number=%s\n" >>"$GITHUB_OUTPUT"
        $(gh pr list
        --repo ${{ github.repository }}
        --search ${{ github.sha }}
        --json number
        --jq '.[0].number // 0')
      env:
        GH_TOKEN: ${{ github.token }}
  golangci-lint:
    name: golangci-lint
    needs: get-pr-number
    runs-on: ubuntu-latest
    if: ${{ ! needs.get-pr-number.outputs.number }}
    strategy:
      matrix:
        os: [darwin, linux, windows]
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: go.mod
    - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
      env:
        GOOS: ${{ matrix.os }}
  bats:
    name: Lint BATS
    needs: get-pr-number
    runs-on: ubuntu-latest
    if: ${{ ! needs.get-pr-number.outputs.number }}
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: go.mod
    - name: Install shfmt
      run: go install mvdan.cc/sh/v3/cmd/shfmt@latest # spellchecker:ignore
    - run: make -C bats lint
  spelling:
    name: Check Spelling
    needs: get-pr-number
    runs-on: ubuntu-latest
    if: ${{ ! needs.get-pr-number.outputs.number }}
    steps:
    - run: sudo apt install cpanminus
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
        submodules: recursive
    - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: go.mod
    - run: make spelling
  ltag:
    name: Check license tags
    needs: get-pr-number
    runs-on: ubuntu-latest
    if: ${{ ! needs.get-pr-number.outputs.number }}
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: go.mod
    - run: make check-ltag
