name: BATS

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-pr-number:
    name: Lookup Pull Request
    outputs:
      number: ${{ steps.lookup.outputs.number }}
    runs-on: ubuntu-latest
    steps:
    - id: lookup
      if: >-
        github.event_name == 'push' &&
        github.repository_owner == 'rancher-sandbox' &&
        github.ref_type == 'branch' &&
        !github.ref_protected
      shell: bash
      run: >-
        printf "number=%s\n"
        $(gh pr list
        --repo ${{ github.repository }}
        --search ${{ github.sha }}
        --json number
        --jq '.[0].number // 0')
        | tee --append "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
  bats:
    name: BATS
    needs: get-pr-number
    if: ${{ ! needs.get-pr-number.outputs.number }}
    strategy:
      fail-fast: false
      matrix:
        # Using macos-intel because macos-aarch64 does not have nested virtualization.
        runs-on:
        - macos-15-intel
        - ubuntu-latest
        - windows-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: "Linux: Install prerequisites"
      if: runner.os == 'Linux'
      working-directory: ${{ runner.temp }}
      run: |
        # Enable KVM access
        test -w /dev/kvm || sudo chmod a+rwx /dev/kvm

        # Set unprivileged port start to 80
        if test $(cat /proc/sys/net/ipv4/ip_unprivileged_port_start) -gt 80; then
          sudo sh -c 'echo 80 > /proc/sys/net/ipv4/ip_unprivileged_port_start'
        fi

        # Install qemu-img for Lima disk operations
        sudo apt-get update
        sudo apt-get install --yes qemu-utils

        # Set up run-in-wsl helper script (as a symlink to bash)
        mkdir -p bin
        ln -s $(which bash) bin/run-in-wsl
        readlink -f bin >> "$GITHUB_PATH"

        # Install a newer version of jq
        wget --output-document=bin/jq https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64
        chmod a+x bin/jq

    - name: "macOS: Install prerequisites"
      if: runner.os == 'macOS'
      working-directory: ${{ runner.temp }}
      run: |
        brew install bash

        # Set up run-in-wsl helper script (as a symlink to bash)
        mkdir -p bin
        ln -s $(brew --prefix bash)/bin/bash bin/run-in-wsl
        readlink -f bin >> "$GITHUB_PATH"

    - name: "Windows: install prerequisites"
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ runner.temp }}
      run: |
        # Stop unwanted services
        Get-Service -ErrorAction Continue -Name @('W3SVC', 'docker') |
          Stop-Service

        # Update any pre-installed WSL
        # Sometimes this fails; retry in a loop.
        do { wsl --update } while ( -not $? )
        # Setting the default version also lets WSL finish updating.
        wsl --set-default-version 2

        # Install WSL2 Distribution
        wsl --install --no-launch --version 2 --name openSUSE openSUSE-Leap-16.0
        # Disable first-boot script
        wsl --distribution openSUSE --exec sed -i '/^command =/d' /etc/wsl-distribution.conf

        # Make sure WSL interop is enabled
        wsl --distribution openSUSE --exec sh -c 'echo ":WSLInterop-custom:M::MZ::/init:PF" | tee /etc/binfmt.d/zzz-WSLInterop-custom.conf' # spellchecker:ignore
        wsl --shutdown

        # Set up wrapper script PATH
        New-Item -ItemType Directory -Name bin -Force
        Get-ItemPropertyValue -Path bin -Name FullName | Out-File -Encoding UTF8 -Append "$env:GITHUB_PATH"

        # Set up git configuration
        git config --global --replace-all core.autocrlf false # spellchecker:ignore
        git config --global --replace-all core.eol lf # spellchecker:ignore
        git config --global --replace-all core.longpath true #spellchecker:ignore

    - name: "Windows: write wrapper script"
      # This is a separate step so that we can just set up the script as an
      # inline YAML block.
      if: runner.os == 'Windows'
      shell: cmd /c copy {0} run-in-wsl.cmd
      working-directory: ${{ runner.temp }}/bin
      run: |
        IF NOT DEFINED DISTRO SET DISTRO=openSUSE
        FOR /F "usebackq tokens=*" %%L IN (`wsl --distribution %DISTRO% --exec wslpath -ua %1`) DO (
          wsl --distribution %DISTRO% --exec /bin/bash -c "tr -d '\r' < %%L | /bin/bash -e"
          EXIT %%ERRORLEVEL%%
        )

    - name: "Windows: Install prerequisites in WSL"
      if: runner.os == 'Windows'
      shell: run-in-wsl {0}
      run: >-
        zypper --non-interactive install
        jq make netcat-openbsd

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        submodules: recursive
    - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: go.mod

    - name: "Windows: WSL interop debugging"
      if: runner.os == 'Windows'
      shell: run-in-wsl {0}
      run: |
        set +e
        ls -l /proc/sys/fs/binfmt_misc
        for i in /proc/sys/fs/binfmt_misc/*; do
          echo "$i"
          cat "$i" || true
        done
        systemctl status systemd-binfmt.service || true
      continue-on-error: true

    - run: make -C bats
      shell: run-in-wsl {0}
      env:
        RDD_TRACE: true

    - name: Collect RDD service logs
      if: always()
      shell: run-in-wsl {0}
      run: |
        mkdir -p rdd-logs
        for instance in $(make --no-print-directory -C bats bats-instances); do
          RDD_INSTANCE="$instance" bin/rdd svc log > "rdd-logs/${instance}.log" || true
        done

    - name: Upload RDD service logs
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: rdd-logs-${{ matrix.runs-on }}
        path: rdd-logs/
        if-no-files-found: ignore
