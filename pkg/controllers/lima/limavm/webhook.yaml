---
# This file is for reference only. The actual webhook configuration is created
# dynamically by the admission controller with proper TLS certificates.
# See controller.go for the runtime webhook configuration implementation.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: limavm-validator
  labels:
    app.kubernetes.io/name: limavm-validator
    app.kubernetes.io/component: admission-webhook
    app.kubernetes.io/managed-by: rdd
webhooks:
- name: limavm.lima.rancherdesktop.io
  clientConfig:
    # URL is dynamically determined based on server IP
    url: "https://SERVER_IP:9443/mutate-lima-rancherdesktop-io-v1alpha1-limavm"
    # CA bundle is dynamically populated from RDD's certificate infrastructure
    caBundle: CA_BUNDLE_BASE64
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["lima.rancherdesktop.io"]
    apiVersions: ["v1alpha1"]
    resources: ["limavms"]
  admissionReviewVersions: ["v1", "v1beta1"]
  sideEffects: None
  failurePolicy: Fail
