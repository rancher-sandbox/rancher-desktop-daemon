cpus: 2
memory: "6442450944"
mounts:
- location: "~"
  writable: true
ssh:
  loadDotSSHPubKeys: false
firmware:
  legacyBIOS: false
containerd:
  system: false
  user: false
portForwards:
- guestPort: 6443
  hostIP: 127.0.0.1
  hostPort: 6443
- guestIPMustBeZero: true
  guestPortRange:
  - 1
  - 65535
  hostIP: 0.0.0.0
  hostPortRange:
  - 0
  - 0
- guestPortRange:
  - 0
  - 0
  guestSocket: /var/run/docker.sock
  hostPortRange:
  - 0
  - 0
  hostSocket: "{{.Param.HOST_DOCKER_SOCKET}}"
provision:
# Write runtime parameters as a systemd EnvironmentFile. Using mode:data lets
# Lima's Go template engine handle quoting via printf "%q", which produces
# double-quoted strings compatible with systemd's EnvironmentFile parser.
# Lima's boot script creates parent directories automatically.
- mode: data
  path: /etc/sysconfig/rancher-desktop
  content: |
    CONTAINER_ENGINE={{printf "%q" .Param.CONTAINER_ENGINE}}
    HOST_DOCKER_SOCKET={{printf "%q" .Param.HOST_DOCKER_SOCKET}}
    HOST_HOME_GUEST={{printf "%q" .Param.HOST_HOME_GUEST}}
    KUBERNETES_ENABLED={{.Param.KUBERNETES_ENABLED}}
    KUBERNETES_VERSION={{.Param.KUBERNETES_VERSION}}
    KUBERNETES_PORT={{.Param.KUBERNETES_PORT}}
- mode: system
  script: |
    #!/bin/bash

    set -o errexit -o nounset -o pipefail -o xtrace

    systemctl stop rancher-desktop.target

    # Enable the requested container engine and disable the other.
    # containerd.service has a Conflicts=docker, so we must not start both.
    CONTAINERD_ACTION=$([[ $PARAM_CONTAINER_ENGINE = containerd ]] && echo enable || echo disable)
    DOCKER_ACTION=$([[ $PARAM_CONTAINER_ENGINE = moby ]] && echo enable || echo disable)
    systemctl "$CONTAINERD_ACTION" containerd.service buildkitd.service
    systemctl "$DOCKER_ACTION" docker.service docker.socket

    if [[ $PARAM_KUBERNETES_ENABLED == "true" ]]; then
        export INSTALL_K3S_VERSION="v${PARAM_KUBERNETES_VERSION}+k3s1"
        INSTALLED_VERSION=""
        # awk must read to EOF; `{print; exit}` closes the pipe while k3s
        # is still writing, and the SIGPIPE propagates via pipefail + errexit.
        [[ -x /usr/local/bin/k3s ]] && INSTALLED_VERSION=$(/usr/local/bin/k3s --version | awk 'NR==1{print $3}')
        if [[ $INSTALL_K3S_VERSION != "${INSTALLED_VERSION}" ]]; then
            # Don't enable k3s at install time; add it as a want of rancher-desktop.target instead.
            export INSTALL_K3S_SKIP_ENABLE=true
            (
                export PATH=/usr/local/sbin:/usr/local/bin:/usr/bin:/sbin:/bin
                curl -sfL https://get.k3s.io | sh -
            )
            systemctl add-wants rancher-desktop.target k3s.service
        fi

        if [[ $PARAM_CONTAINER_ENGINE == "containerd" ]]; then
            echo "K3S_CONTAINER_ENGINE_OPTIONS=--container-runtime-endpoint /run/k3s/containerd/containerd.sock" \
                >/etc/systemd/system/k3s.service.env
        else
            echo "K3S_CONTAINER_ENGINE_OPTIONS=--docker" >/etc/systemd/system/k3s.service.env
        fi

        # Remove stale kubeconfig so k3s regenerates it on start.
        rm -f /etc/rancher/k3s/k3s.yaml
    fi

    # Use --no-block so the provision script exits immediately. Lima writes
    # lima-boot-done as soon as all provision scripts finish, and k3s startup
    # time is absorbed by the kubeconfig probe below instead of blocking here.
    systemctl start --no-block rancher-desktop.target

probes:
- description: Write k3s kubeconfig to instance config path
  script: |
    #!/bin/bash

    # This script runs in USER mode.

    set -o errexit -o nounset -o pipefail -o xtrace

    if [[ $PARAM_KUBERNETES_ENABLED != "true" ]]; then
        exit 0
    fi

    K3S_YAML=/etc/rancher/k3s/k3s.yaml
    for _ in $(seq 300); do
        if [[ -e $K3S_YAML ]]; then
            sleep 1
            # Copy the raw k3s kubeconfig to the host instance config path.
            # The kubernetes controller on the host reads this file to probe
            # the API server and manage the user's ~/.kube/config context.
            mkdir -p "$(dirname "$PARAM_HOST_INSTANCE_CONFIG")"
            sudo cp "$K3S_YAML" "$PARAM_HOST_INSTANCE_CONFIG"
            exit 0
        fi
        sleep 1
    done
    exit 1
hostResolver:
  hosts:
    host.docker.internal: host.lima.internal
    host.rancher-desktop.internal: host.lima.internal
    lima-rancher-desktop: lima-0
vmOpts:
  vz:
    rosetta:
      enabled: false
      binfmt: false
